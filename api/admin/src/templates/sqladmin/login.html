{% extends "sqladmin/base.html" %}

{% block head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">
<link rel="stylesheet" href="{{ main_url_for('admin-assets', path='admin.min.css') }}">
<script>
  var _theme = localStorage.getItem('admin-theme') || 'light';
  document.documentElement.setAttribute('data-bs-theme', _theme === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : _theme);
</script>
{% endblock %}

{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <i class="fa-solid fa-database login-brand-icon"></i>
      <span class="login-brand-name">PgAdmin</span>
    </div>
    <p class="login-subtitle">Sign in to your account</p>
    <form action="{{ url_for('admin:login') }}" method="POST" autocomplete="off">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control{% if error %} is-invalid{% endif %}" placeholder="Enter username" autocomplete="off">
        {% if error %}<div class="invalid-feedback">{{ error }}</div>{% endif %}
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control{% if error %} is-invalid{% endif %}" placeholder="Enter password" autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}

{% block tail %}
<script src="{{ main_url_for('admin-assets', path='admin.min.js') }}" defer></script>
{% endblock %}
