name: Auto Deploy to Contabo

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'n8n_workflows/**'
  workflow_dispatch:
    inputs:
      services:
        description: 'Space-separated containers to restart (e.g. "admin-api frontend") or "all"'
        required: false
        default: 'all'

env:
  SECRETS_JSON: ${{ toJSON(secrets) }}
  VARS_JSON: ${{ toJSON(vars) }}
  DEPLOY_PATH: /www/wwwroot/n8n.atharvadevasthali.com

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-api/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint frontend
        run: |
          cd admin-api/frontend
          npm ci
          npm run lint

      - name: Lint API
        run: |
          pip install --quiet black isort ruff
          cd api
          python -m isort --check .
          python -m black --check .
          python -m ruff check .

  deploy:
    needs: lint
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: pip install --quiet ansible

      - name: Generate .env file
        run: |
          rm -f .env

          echo "$SECRETS_JSON" | jq -r '
            to_entries
            | map(select(
                (.key | test("^(github_token|CONTABO_.*)$") | not)
                and (.value | type == "string")
              ))
            | map("\(.key)=\(.value)")
            | .[]
          ' > .env

          echo "$VARS_JSON" | jq -r '
            to_entries
            | map(select(.value | type == "string"))
            | map("\(.key)=\(.value)")
            | .[]
          ' >> .env

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CONTABO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Detect changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICES: ${{ github.event.inputs.services }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SERVICES="${INPUT_SERVICES:-all}"
            if [ -z "$SERVICES" ] || [ "$SERVICES" = "all" ]; then
              echo "full_deploy=true"  >> $GITHUB_OUTPUT
              echo "main_services="   >> $GITHUB_OUTPUT
              echo "worker_services=" >> $GITHUB_OUTPUT
            else
              echo "full_deploy=false"          >> $GITHUB_OUTPUT
              echo "main_services=$SERVICES"    >> $GITHUB_OUTPUT
              echo "worker_services=$SERVICES"  >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # Push event: detect from changed paths across all commits in the push
          CHANGED=$(git diff ${{ github.event.before }} HEAD --name-only 2>/dev/null || echo '')
          echo "Changed files:"
          echo "$CHANGED"

          MAIN_SVCS=""
          WORKER_SVCS=""
          FULL=false

          echo "$CHANGED" | grep -q '^admin-api/' && MAIN_SVCS="$MAIN_SVCS admin-api frontend"
          echo "$CHANGED" | grep -q '^api/' && MAIN_SVCS="$MAIN_SVCS media-api" && WORKER_SVCS="$WORKER_SVCS media-api"
          echo "$CHANGED" | grep -q '^processes/' && MAIN_SVCS="$MAIN_SVCS worker-monitor" && WORKER_SVCS="$WORKER_SVCS worker-monitor"
          echo "$CHANGED" | grep -q '^nginx/' && MAIN_SVCS="$MAIN_SVCS nginx"
          echo "$CHANGED" | grep -q '^custom-n8n-nodes/' && MAIN_SVCS="$MAIN_SVCS n8n" && WORKER_SVCS="$WORKER_SVCS n8n"
          echo "$CHANGED" | grep -q '^\(loki\|promtail\)' && MAIN_SVCS="$MAIN_SVCS loki promtail"
          echo "$CHANGED" | grep -q '^docker/' && FULL=true
          echo "$CHANGED" | grep -q '^package' && FULL=true
          echo "$CHANGED" | grep -q '^ansible/' && FULL=true
          echo "$CHANGED" | grep -q '^sh_files/' && FULL=true

          # Deduplicate and trim
          MAIN_SVCS=$(echo $MAIN_SVCS | tr ' ' '\n' | sort -u | xargs)
          WORKER_SVCS=$(echo $WORKER_SVCS | tr ' ' '\n' | sort -u | xargs)

          echo "full_deploy=$FULL"            >> $GITHUB_OUTPUT
          echo "main_services=$MAIN_SVCS"     >> $GITHUB_OUTPUT
          echo "worker_services=$WORKER_SVCS" >> $GITHUB_OUTPUT

      # ── Topology detection ─────────────────────────────────────────────────
      - name: Detect topology and build worker inventory
        id: topology
        env:
          CONTABO_WORKER_IP: ${{ secrets.CONTABO_WORKER_IP }}
        run: |
          if [ -z "$CONTABO_WORKER_IP" ]; then
            echo "topology=single" >> $GITHUB_OUTPUT
          else
            echo "topology=multi" >> $GITHUB_OUTPUT
            bash sh_files/gen_workers_inventory.sh
          fi

      # ── Single ─────────────────────────────────────────────────────────────
      - name: Deploy (single)
        if: steps.topology.outputs.topology == 'single'
        env:
          CONTABO_MAIN_IP: ${{ secrets.CONTABO_MAIN_IP }}
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          ansible-playbook -i ansible/inventory/single.yml ansible/playbooks/deploy_main.yml \
            -e "full_deploy=${{ steps.changes.outputs.full_deploy }}" \
            -e "services=${{ steps.changes.outputs.main_services }}"

      # ── Multi ──────────────────────────────────────────────────────────────
      - name: Deploy main (multi)
        if: steps.topology.outputs.topology == 'multi'
        env:
          CONTABO_MAIN_IP: ${{ secrets.CONTABO_MAIN_IP }}
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          ansible-playbook -i ansible/inventory/multi/main.yml ansible/playbooks/deploy_main.yml \
            -e "full_deploy=${{ steps.changes.outputs.full_deploy }}" \
            -e "services=${{ steps.changes.outputs.main_services }}"

      - name: Deploy workers (multi)
        if: steps.topology.outputs.topology == 'multi'
        env:
          ANSIBLE_CONFIG: ansible/ansible.cfg
        run: |
          ansible-playbook -i ansible/inventory/multi/workers_dynamic.yml ansible/playbooks/deploy_workers.yml \
            -e "full_deploy=${{ steps.changes.outputs.full_deploy }}" \
            -e "worker_services=${{ steps.changes.outputs.worker_services }}"
