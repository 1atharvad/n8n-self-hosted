name: n8n-automation

services:
  n8n-worker:
    image: n8nio/n8n:latest
    entrypoint: ["/bin/sh", "/sh_files/start-n8n-worker.sh"]
    restart: unless-stopped
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      - N8N_RESTRICT_FILE_ACCESS_TO=
      - N8N_ALLOWED_READ_PATHS=/home/node/.n8n:/home/node/n8n_files:/sh_files:/tmp
      - N8N_ALLOWED_WRITE_PATHS=/home/node/.n8n:/home/node/n8n_files:/sh_files:/tmp
      - N8N_COMMUNITY_PACKAGES=${N8N_COMMUNITY_PACKAGES}
      - DB_TYPE=${DB_TYPE}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST}
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=${REDIS_HOST}
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD=3900000
      - QUEUE_BULL_MAX_STALLED_COUNT=5
      - QUEUE_BULL_STALLED_INTERVAL=60000
      - EXECUTIONS_TIMEOUT=10800
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_STORAGE_PATH=/home/node/.n8n/binaryData
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - ${HOST_PROJECT_DIR}/n8n-data:/home/node/.n8n
      - ${HOST_PROJECT_DIR}/n8n_files:/home/node/n8n_files
      - ${HOST_PROJECT_DIR}/sh_files:/sh_files
    depends_on:
      - fastapi
    networks:
      - baota_net

  fastapi:
    build: ${HOST_PROJECT_DIR}/api
    container_name: media-api
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_HOST: ${DB_POSTGRESDB_HOST}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      API_KEY: ${API_KEY}
    expose:
      - "9374"
    volumes:
      - ${HOST_PROJECT_DIR}/tts_cache:/tts_cache
      - ${HOST_PROJECT_DIR}/n8n_files:/n8n_files
    networks:
      - baota_net

networks:
  baota_net:
