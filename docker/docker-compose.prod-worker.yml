name: n8n-automation

services:
  n8n-worker:
    image: n8nio/n8n:latest
    entrypoint: ["/bin/sh", "/sh_files/start-n8n-worker.sh"]
    restart: unless-stopped
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      - N8N_RESTRICT_FILE_ACCESS_TO=
      - N8N_ALLOWED_READ_PATHS=/home/node/.n8n:/home/node/n8n_files:/sh_files:/tmp
      - N8N_ALLOWED_WRITE_PATHS=/home/node/.n8n:/home/node/n8n_files:/sh_files:/tmp
      - N8N_COMMUNITY_PACKAGES=${N8N_COMMUNITY_PACKAGES}
      - DB_TYPE=${DB_TYPE}
      - DB_POSTGRESDB_HOST=${DB_POSTGRESDB_HOST}
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=${REDIS_HOST}
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD=3900000
      - QUEUE_BULL_MAX_STALLED_COUNT=10
      - QUEUE_BULL_STALLED_INTERVAL=300000
      - EXECUTIONS_TIMEOUT=10800
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_STORAGE_PATH=/home/node/.n8n/binaryData
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - ${HOST_PROJECT_DIR}/n8n-data:/home/node/.n8n
      - ${HOST_PROJECT_DIR}/n8n_files:/home/node/n8n_files
      - ${HOST_PROJECT_DIR}/sh_files:/sh_files
    depends_on:
      - fastapi
    networks:
      - baota_net

  worker-monitor:
    build:
      context: ${HOST_PROJECT_DIR}/processes
      dockerfile: Dockerfile.worker-monitor
    container_name: worker-monitor
    restart: unless-stopped
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: 6379
      COMPOSE_PROJECT_NAME: n8n-automation
      POLL_INTERVAL_SEC: ${WORKER_MONITOR_POLL_SEC:-30}
      SERVER_ID: ${SERVER_ID}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      CPU_GATE_THRESHOLD: ${CPU_GATE_THRESHOLD:-35}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
    networks:
      - baota_net

  fastapi:
    build: ${HOST_PROJECT_DIR}/api
    container_name: media-api
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_HOST: ${DB_POSTGRESDB_HOST}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      API_KEY: ${API_KEY}
      CPU_GATE_THRESHOLD: ${CPU_GATE_THRESHOLD:-35}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: 6379
      SERVER_ID: ${SERVER_ID}
    expose:
      - "9374"
    volumes:
      - ${HOST_PROJECT_DIR}/tts_cache:/tts_cache
      - ${HOST_PROJECT_DIR}/n8n_files:/n8n_files
      - /proc:/host/proc:ro
    networks:
      - baota_net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOST_PROJECT_DIR}/promtail-config.yaml:/etc/promtail/promtail.yaml:ro
    environment:
      LOKI_URL: ${LOKI_URL}
    command: -config.file=/etc/promtail/promtail.yaml
    networks:
      - baota_net

networks:
  baota_net:
