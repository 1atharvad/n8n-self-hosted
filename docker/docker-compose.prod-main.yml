name: n8n-automation

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS}
      - N8N_RESTRICT_FILE_ACCESS_TO=
      - N8N_ALLOWED_READ_PATHS=/home/node/.n8n:/home/node/n8n_files:/sh_files:/tmp
      - N8N_ALLOWED_WRITE_PATHS=/home/node/.n8n:/home/node/n8n_files:/sh_files:/tmp
      - N8N_TRUST_PROXY=${N8N_TRUST_PROXY}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - N8N_LISTEN_ADDRESS=${N8N_LISTEN_ADDRESS}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_STORAGE_PATH=/home/node/.n8n/binaryData
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - VUE_APP_URL_BASE_API=${VUE_APP_URL_BASE_API}
      - N8N_DISABLE_PRODUCTION_MAIN_PROCESS=false
      - NODES_EXCLUDE=[]
      - N8N_COMMUNITY_PACKAGES=${N8N_COMMUNITY_PACKAGES}
      - DB_TYPE=${DB_TYPE}
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_TUNNEL_URL}
      - EXECUTIONS_TIMEOUT=10800
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - NODE_ENV=production
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD=3600000
      - QUEUE_BULL_MAX_STALLED_COUNT=3
      - OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS=true
    volumes:
      - ${HOST_PROJECT_DIR}/n8n-data:/home/node/.n8n
      - ${HOST_PROJECT_DIR}/n8n_files:/home/node/n8n_files
      - ${HOST_PROJECT_DIR}/sh_files:/sh_files
      - ${HOST_PROJECT_DIR}/n8n-workflows:/home/node/n8n-workflows
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - baota_net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - baota_net

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${HOST_PROJECT_DIR}/postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - baota_net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "6060:6060"
    volumes:
      - ${HOST_PROJECT_DIR}/nginx/nginx.conf:/etc/nginx/conf.d/nginx.conf:ro
    depends_on:
      - n8n
      - minio
      - logs-api
      - frontend
    networks:
      - baota_net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${N8N_EDITOR_BASE_URL}/minio/
    volumes:
      - ${HOST_PROJECT_DIR}/minio-data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - baota_net

  logs-api:
    build: ${HOST_PROJECT_DIR}/logs-api
    container_name: logs-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-24}
      LOGS_ADMIN_USERNAME: ${LOGS_ADMIN_USERNAME:-admin}
      LOGS_ADMIN_PASSWORD: ${LOGS_ADMIN_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - baota_net

  frontend:
    build: ${HOST_PROJECT_DIR}/api/frontend
    container_name: frontend
    restart: unless-stopped
    expose:
      - "5173"
    networks:
      - baota_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    user: "0"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ${HOST_PROJECT_DIR}/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - ${HOST_PROJECT_DIR}/loki-data:/tmp/loki
    ports:
      - "3100:3100"
    networks:
      - baota_net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${HOST_PROJECT_DIR}/promtail-config.yaml:/etc/promtail/promtail.yaml:ro
    command: -config.file=/etc/promtail/promtail.yaml
    networks:
      - baota_net

networks:
  baota_net:
