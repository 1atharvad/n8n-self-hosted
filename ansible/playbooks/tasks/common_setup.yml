- name: Pull latest code
  shell: |
    cd {{ deploy_path }}
    git fetch origin main
    git reset --hard origin/main

- name: Copy .env file
  copy:
    src: "{{ lookup('env', 'PWD') }}/.env"
    dest: "{{ deploy_path }}/.env"
    mode: '0600'

- name: Append static config to .env
  blockinfile:
    path: "{{ deploy_path }}/.env"
    marker: "# {mark} ANSIBLE STATIC CONFIG"
    block: |
      N8N_PORT={{ N8N_PORT }}
      N8N_PROTOCOL={{ N8N_PROTOCOL }}
      N8N_LISTEN_ADDRESS={{ N8N_LISTEN_ADDRESS }}
      N8N_SECURE_COOKIE={{ N8N_SECURE_COOKIE }}
      N8N_TRUST_PROXY={{ N8N_TRUST_PROXY }}
      N8N_PROXY_HOPS={{ N8N_PROXY_HOPS }}
      N8N_BASIC_AUTH_ACTIVE={{ N8N_BASIC_AUTH_ACTIVE }}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS={{ N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS }}
      DB_TYPE={{ DB_TYPE }}
      DB_POSTGRESDB_HOST={{ DB_POSTGRESDB_HOST }}
      POSTGRES_PORT={{ POSTGRES_PORT }}
      POSTGRES_HOST={{ POSTGRES_HOST }}
      REDIS_HOST={{ REDIS_HOST }}
      REDIS_PORT={{ REDIS_PORT }}
      N8N_BASE_URL={{ N8N_BASE_URL }}
      MINIO_ENDPOINT={{ MINIO_ENDPOINT }}
      ADMIN_API_URL={{ ADMIN_API_URL }}
      NODE_OPTIONS={{ NODE_OPTIONS }}
      EXECUTIONS_TIMEOUT={{ EXECUTIONS_TIMEOUT }}
      EXECUTIONS_DATA_MAX_AGE={{ EXECUTIONS_DATA_MAX_AGE }}
      QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD={{ QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD }}
      QUEUE_BULL_MAX_STALLED_COUNT={{ QUEUE_BULL_MAX_STALLED_COUNT }}
      QUEUE_BULL_STALLED_INTERVAL={{ QUEUE_BULL_STALLED_INTERVAL }}
      WORKER_MONITOR_POLL_SEC={{ WORKER_MONITOR_POLL_SEC }}
      SERVER_ID={{ SERVER_ID }}
      CPU_GATE_THRESHOLD={{ CPU_GATE_THRESHOLD }}
      JWT_EXPIRE_HOURS={{ JWT_EXPIRE_HOURS }}
      LOGS_ADMIN_USERNAME={{ LOGS_ADMIN_USERNAME }}
      ADMIN_USERNAME={{ ADMIN_USERNAME }}

- name: Install node dependencies
  shell: npm install
  args:
    chdir: "{{ deploy_path }}"

- name: Run setup script (dirs, assets, custom n8n nodes)
  shell: sh sh_files/setup_n8n_files.sh
  args:
    chdir: "{{ deploy_path }}"
