auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn # Changed from info to reduce unnecessary disk and log I/O overhead

common:
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

ingester:
  wal:
    dir: /tmp/loki/wal
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_transfer_retries: 0

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /tmp/loki/index
    cache_location: /tmp/loki/index_cache
  filesystem:
    directory: /tmp/loki/chunks

# --- PERFORMANCE RESTRAINTS FOR CONTABO VPS ---

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # Limits query engine workers from maxing out your CPU cores
  max_query_parallelism: 2
  # Lowers maximum logs queried at once to prevent massive memory/CPU loops
  max_entries_limit_per_query: 5000

query_range:
  # Larger chunks = fewer parallel sub-queries per Grafana request = less CPU spike
  split_queries_by_interval: 6h
  cache_results: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

frontend:
  # Lower queue depth so fewer queries stack up at once
  max_outstanding_per_tenant: 32

compactor:
  working_directory: /tmp/loki/compactor
  # 30m instead of 10m to reduce frequent CPU spikes from compaction
  compaction_interval: 30m
  max_compaction_parallelism: 1
